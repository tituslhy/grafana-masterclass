global:
  scrape_interval: 15s
  evaluation_interval: 15s

# The targets to scrape metrics from
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
