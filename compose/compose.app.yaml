# Application Services
# Translation app with frontend, worker, and Redis

services:
  redis:
    image: redis:8.6.0-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
  redis-exporter:
    image: oliver006/redis_exporter:v1.81.0-alpine
    container_name: redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - app
      - observability
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
  frontend:
    container_name: frontend
    ports:
      - "3001:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
      - LOG_LEVEL=info
      - SOURCE_LANGUAGE=en
      - OTEL_SERVICE_NAME=translation-frontend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  worker:
    container_name: worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=info
      - SOURCE_LANGUAGE=en
      - OTEL_SERVICE_NAME=translation-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped
